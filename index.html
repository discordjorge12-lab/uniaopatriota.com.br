<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumi\u00e8re Beaut\u00e9 \u2013 Moda & Beleza Feminina</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --rose: #C9627D;
    --rose-dark: #a84d67;
    --rose-light: #f5d0db;
    --cream: #FDF6F0;
    --gold: #C9A96E;
    --dark: #2d1f26;
    --gray: #7a6b72;
    --light-gray: #f0e8ec;
    --white: #ffffff;
    --shadow: 0 4px 24px rgba(201,98,125,0.10);
    --shadow-hover: 0 12px 40px rgba(201,98,125,0.22);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Nunito',sans-serif; background:var(--cream); color:var(--dark); }

  /* HEADER */
  header {
    background:var(--white);
    border-bottom:1px solid var(--rose-light);
    position:sticky; top:0; z-index:1000;
    box-shadow:0 2px 16px rgba(201,98,125,0.08);
  }
  .top-bar {
    background:var(--rose);
    color:#fff;
    text-align:center;
    font-size:13px;
    padding:7px;
    letter-spacing:1px;
    font-weight:600;
  }
  .header-inner {
    max-width:1300px;
    margin:0 auto;
    padding:16px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
  }
  .logo {
    font-family:'Cormorant Garamond',serif;
    font-size:32px;
    font-weight:600;
    color:var(--dark);
    letter-spacing:2px;
    text-decoration:none;
  }
  .logo span { color:var(--rose); }
  .search-bar {
    flex:1;
    max-width:480px;
    display:flex;
    border:2px solid var(--rose-light);
    border-radius:50px;
    overflow:hidden;
    transition:.3s;
  }
  .search-bar:focus-within { border-color:var(--rose); }
  .search-bar input {
    flex:1;
    border:none;
    outline:none;
    padding:10px 18px;
    font-family:'Nunito',sans-serif;
    font-size:14px;
    background:transparent;
  }
  .search-bar button {
    background:var(--rose);
    border:none;
    padding:10px 20px;
    color:#fff;
    cursor:pointer;
    font-size:15px;
    transition:.3s;
  }
  .search-bar button:hover { background:var(--rose-dark); }
  .header-actions { display:flex; gap:20px; align-items:center; }
  .header-actions a {
    text-decoration:none;
    color:var(--dark);
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:12px;
    gap:4px;
    font-weight:600;
    transition:.2s;
  }
  .header-actions a:hover { color:var(--rose); }
  .header-actions a i { font-size:20px; }
  .cart-btn {
    position:relative;
    cursor:pointer;
    background:none;
    border:none;
    color:var(--dark);
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:12px;
    gap:4px;
    font-weight:600;
    font-family:'Nunito',sans-serif;
    transition:.2s;
  }
  .cart-btn:hover { color:var(--rose); }
  .cart-btn i { font-size:20px; }
  .cart-count {
    position:absolute;
    top:-6px; right:-8px;
    background:var(--rose);
    color:#fff;
    border-radius:50%;
    width:18px; height:18px;
    font-size:11px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
  }

  /* NAV */
  nav {
    background:var(--dark);
    padding:0 24px;
  }
  .nav-inner {
    max-width:1300px;
    margin:0 auto;
    display:flex;
    gap:0;
  }
  .nav-inner a {
    color:#fff;
    text-decoration:none;
    padding:13px 22px;
    font-size:13px;
    font-weight:600;
    letter-spacing:1px;
    text-transform:uppercase;
    transition:.2s;
    border-bottom:3px solid transparent;
  }
  .nav-inner a:hover, .nav-inner a.active {
    color:var(--rose-light);
    border-bottom-color:var(--rose);
    background:rgba(201,98,125,0.10);
  }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, #2d1f26 0%, #4a2535 50%, #7a3a52 100%);
    min-height:520px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
    text-align:center;
  }
  .hero::before {
    content:'';
    position:absolute;
    inset:0;
    background:url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=1400&auto=format&fit=crop') center/cover no-repeat;
    opacity:0.22;
  }
  .hero-content {
    position:relative;
    z-index:2;
    padding:40px 24px;
  }
  .hero-content p {
    color:var(--rose-light);
    font-size:14px;
    letter-spacing:4px;
    text-transform:uppercase;
    margin-bottom:16px;
    font-weight:600;
  }
  .hero-content h1 {
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(42px,7vw,80px);
    color:#fff;
    font-weight:300;
    line-height:1.1;
    margin-bottom:20px;
  }
  .hero-content h1 em { font-style:italic; color:var(--rose-light); }
  .hero-content span {
    display:block;
    color:rgba(255,255,255,0.75);
    font-size:17px;
    margin-bottom:36px;
    font-weight:300;
  }
  .btn-primary {
    display:inline-block;
    background:var(--rose);
    color:#fff;
    padding:15px 40px;
    border-radius:50px;
    text-decoration:none;
    font-weight:700;
    font-size:15px;
    letter-spacing:1px;
    transition:.3s;
    border:none;
    cursor:pointer;
    font-family:'Nunito',sans-serif;
  }
  .btn-primary:hover { background:var(--rose-dark); transform:translateY(-2px); box-shadow:0 8px 24px rgba(201,98,125,0.4); }
  .btn-outline {
    display:inline-block;
    background:transparent;
    color:var(--rose);
    padding:13px 36px;
    border-radius:50px;
    text-decoration:none;
    font-weight:700;
    font-size:14px;
    letter-spacing:1px;
    border:2px solid var(--rose);
    cursor:pointer;
    font-family:'Nunito',sans-serif;
    transition:.3s;
    margin-left:12px;
  }
  .btn-outline:hover { background:var(--rose); color:#fff; }

  /* FEATURES BAR */
  .features {
    background:var(--white);
    border-bottom:1px solid var(--rose-light);
    padding:20px 24px;
  }
  .features-inner {
    max-width:1300px;
    margin:0 auto;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:16px;
  }
  .feature-item {
    display:flex;
    align-items:center;
    gap:12px;
    font-size:13px;
  }
  .feature-item i { color:var(--rose); font-size:22px; }
  .feature-item strong { display:block; font-size:14px; color:var(--dark); }
  .feature-item span { color:var(--gray); }

  /* MAIN CONTAINER */
  .container { max-width:1300px; margin:0 auto; padding:0 24px; }

  /* SECTION TITLE */
  .section-header {
    text-align:center;
    margin:56px 0 36px;
  }
  .section-header p {
    color:var(--rose);
    font-size:13px;
    letter-spacing:4px;
    text-transform:uppercase;
    font-weight:700;
    margin-bottom:12px;
  }
  .section-header h2 {
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(28px,4vw,44px);
    font-weight:400;
    color:var(--dark);
    line-height:1.2;
  }
  .section-header .divider {
    width:60px; height:2px;
    background:var(--rose);
    margin:16px auto 0;
    border-radius:2px;
  }

  /* CATEGORIES */
  .categories-grid {
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:16px;
    margin-bottom:48px;
  }
  .cat-card {
    background:var(--white);
    border-radius:16px;
    overflow:hidden;
    cursor:pointer;
    transition:.3s;
    box-shadow:var(--shadow);
    border:2px solid transparent;
    text-align:center;
  }
  .cat-card:hover, .cat-card.active {
    border-color:var(--rose);
    transform:translateY(-4px);
    box-shadow:var(--shadow-hover);
  }
  .cat-card img {
    width:100%; height:140px; object-fit:cover;
    transition:.3s;
  }
  .cat-card:hover img { transform:scale(1.05); }
  .cat-card-body { padding:14px 12px; }
  .cat-card-body h3 { font-size:13px; font-weight:700; color:var(--dark); margin-bottom:4px; }
  .cat-card-body span { font-size:12px; color:var(--gray); }

  /* PRODUCTS GRID */
  .products-grid {
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:20px;
    margin-bottom:64px;
  }
  .product-card {
    background:var(--white);
    border-radius:18px;
    overflow:hidden;
    transition:.3s;
    box-shadow:var(--shadow);
    position:relative;
    display:flex;
    flex-direction:column;
  }
  .product-card:hover { transform:translateY(-6px); box-shadow:var(--shadow-hover); }
  .product-badge {
    position:absolute;
    top:12px; left:12px;
    background:var(--rose);
    color:#fff;
    font-size:11px;
    font-weight:700;
    padding:4px 10px;
    border-radius:50px;
    z-index:2;
    letter-spacing:.5px;
  }
  .product-badge.novo { background:var(--gold); }
  .product-badge.promo { background:#e53e3e; }
  .product-wishlist {
    position:absolute;
    top:12px; right:12px;
    background:#fff;
    border:none;
    width:34px; height:34px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,0.12);
    z-index:2;
    color:var(--gray);
    font-size:15px;
    transition:.2s;
  }
  .product-wishlist:hover { color:var(--rose); transform:scale(1.1); }
  .product-wishlist.active { color:var(--rose); }
  .product-img-wrap {
    position:relative;
    overflow:hidden;
    height:220px;
